<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Chart Browser</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.14);
      --text: #f5f7ff;
      --muted: #a9b1d6;
      --accent: #7c9cff;
      --accent-2: #8b5cf6;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --radius: 20px;
      --spotify: #1db954;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,156,255,0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(139,92,246,0.18), transparent 35%),
        linear-gradient(180deg, #0b1020, #090d18 55%, #06080f 100%);
    }

    body { padding: 16px; }

    .app {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      padding-bottom: 180px;
    }

    .hero, .panel, .track-card, .player-shell {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 12px 14px;
      position: sticky;
      top: 10px;
      z-index: 20;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(124,156,255,0.14);
      color: #dce5ff;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 2px;
    }

    .hero-topbar .eyebrow {
      margin-bottom: 0;
    }

    .spotify-status-pill {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(239,68,68,0.14);
      color: #fecaca;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .spotify-status-pill:hover,
    .spotify-status-pill:focus-visible {
      transform: none;
      outline: none;
      border-color: rgba(239,68,68,0.35);
      background: rgba(239,68,68,0.2);
    }

    .spotify-status-pill.connected {
      background: rgba(34,197,94,0.16);
      color: #cff9db;
    }

    .spotify-status-pill.connected:hover,
    .spotify-status-pill.connected:focus-visible {
      border-color: rgba(34,197,94,0.35);
      background: rgba(34,197,94,0.22);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(132px, 1fr) minmax(132px, 1fr);
      gap: 10px;
      margin-top: 4px;
      align-items: end;
    }

    .control {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .hero-filter-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: end;
    }

    .control label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    select, input {
      width: 100%;
      min-width: 0;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(9, 12, 24, 0.8);
      color: var(--text);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 16px;
      line-height: 1;
      outline: none;
    }

    input::placeholder { color: #7f88b5; }
    select:focus, input:focus { border-color: var(--accent); }

    .search-wrap {
      grid-column: auto;
      position: relative;
      min-width: 0;
    }

    .search-wrap input { padding-left: 38px; }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: calc(50% + 9px);
      transform: translateY(-50%);
      opacity: 0.7;
    }

    .panel { padding: 14px 16px; }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .summary strong {
      display: block;
      font-size: 15px;
    }

    .summary span {
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(34,197,94,0.15);
      color: #cff9db;
      white-space: nowrap;
    }

    .auth-grid {
      display: grid;
      gap: 12px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status-pill {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #dde3ff;
      font-size: 12px;
    }

    .ok { background: rgba(34,197,94,0.15); color: #cff9db; }
    .warn { background: rgba(245,158,11,0.15); color: #ffe0a8; }

    .results {
      display: grid;
      gap: 12px;
    }

    .track-card {
      padding: 14px;
      display: grid;
      gap: 12px;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .track-card:hover {
      transform: translateY(-1px);
      border-color: rgba(124,156,255,0.35);
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .topline-main {
      min-width: 0;
      flex: 1 1 auto;
    }

    .row-actions-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      margin-top: 2px;
    }

    .icon-action {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 15px;
      line-height: 1;
    }

    .spotify-icon-btn {
      background: var(--spotify);
      color: white;
      border: 1px solid rgba(29,185,84,0.45);
    }

    .spotify-glyph {
      width: 16px;
      height: 16px;
      display: block;
    }

    .week {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .song {
      margin: 6px 0 4px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      padding-right: 4px;
    }

    .artist {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #dde3ff;
      font-size: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .hero-random-btn {
      width: 42px;
      height: 42px;
      min-width: 42px;
      padding: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 15px;
      line-height: 1;
      align-self: end;
    }

    .hero-random-btn.is-busy {
      pointer-events: none;
    }

    .hero-random-btn.is-busy .btn-label {
      display: none;
    }

    .hero-random-btn .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.24);
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    .hero-random-btn.is-busy .btn-spinner {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty, .error, .loading {
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    .player-shell {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      padding: 14px;
      z-index: 30;
      background: linear-gradient(180deg, rgba(18,25,50,0.96), rgba(9,12,24,0.96));
    }

    .player-shell.minimized { padding: 10px 12px; }
    .player-minibar {
      display: none;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .player-shell.minimized .player-minibar { display: flex; }
    .player-shell.minimized .player-toprow { display: none; }

    .minibar-cover {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      overflow: hidden;
      flex: 0 0 auto;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 700;
    }

    .minibar-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .minibar-text {
      min-width: 0;
      flex: 1 1 auto;
    }

    .minibar-text strong,
    .minibar-text span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .minibar-text strong { font-size: 13px; }
    .minibar-text span { font-size: 12px; color: var(--muted); }
    .minibar-cue { font-size: 18px; color: var(--muted); flex: 0 0 auto; }

    .player-toprow {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: center;
    }

    .player-cover {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
      overflow: hidden;
      position: relative;
    }

    .player-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .player-cover span {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
    }

    .player-main {
      min-width: 0;
      display: grid;
      gap: 10px;
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .player-title {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .player-title > strong,
    .player-title > span {
      display: block;
      min-width: 0;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
    }

    #closePlayerBtn {
      flex: 0 0 auto;
    }

    .player-title > strong { font-size: 15px; }

    .marquee-line {
      position: relative;
    }

    .marquee-line .marquee-text {
      display: inline-block;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: top;
    }

    .marquee-line.is-overflowing .marquee-text {
      padding-inline-end: 2.5rem;
      overflow: visible;
      text-overflow: clip;
      animation: marquee-scroll var(--marquee-duration, 10s) linear infinite;
      will-change: transform;
    }

    .marquee-line.is-overflowing:hover .marquee-text,
    .marquee-line.is-overflowing:focus-within .marquee-text {
      animation-play-state: paused;
    }

    @keyframes marquee-scroll {
      0%, 12% {
        transform: translateX(0);
      }
      88%, 100% {
        transform: translateX(calc(-1 * var(--marquee-distance, 0px)));
      }
    }

    .player-title > strong { font-size: 15px; }
    .player-title > span {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .player-progress-wrap {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .time {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    #progressBar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      outline: none;
      padding: 0;
      border: 0;
    }

    #progressBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      border: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      cursor: pointer;
    }

    #progressBar::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      border: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      cursor: pointer;
    }

    .player-controls-pro {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .icon-btn,
    .play-btn {
      border: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      cursor: pointer;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      font-size: 16px;
      padding: 0;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      font-size: 20px;
      padding: 0;
      background: white;
      color: #111827;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .tiny {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(3, 6, 18, 0.66);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 40;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-card {
      width: min(100%, 520px);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-header strong {
      font-size: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .position-quick-picks {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: -2px;
    }

    .quick-pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    .quick-pill:hover,
    .quick-pill:focus-visible {
      border-color: rgba(124,156,255,0.45);
      background: rgba(124,156,255,0.14);
      outline: none;
    }

    .quick-pill.active,
    .quick-pill[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--accent), var(--accent-2)) !important;
      color: white !important;
      border-color: transparent !important;
    }

    .summary-copy {
      min-width: 0;
    }

    .summary-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #dde3ff;
      font-size: 12px;
      line-height: 1;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .filter-chip button {
      padding: 0;
      margin: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }

    @media (min-width: 720px) {
      body { padding: 24px; }
      .controls {
        grid-template-columns: 170px 170px minmax(0, 1fr);
        align-items: end;
      }

      .hero-filter-row {
        grid-column: auto;
      }
      .search-wrap { grid-column: auto; }
      .player-shell {
        left: max(24px, calc((100vw - 760px) / 2 + 24px));
        right: max(24px, calc((100vw - 760px) / 2 + 24px));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-topbar">
        <div class="eyebrow">UK chart browser</div>
        <button class="spotify-status-pill" id="spotifyStatusPill" type="button" aria-label="Open Spotify playback settings">Spotify: Login</button>
      </div>
      <div class="controls">
        <div class="control">
          <label for="yearSelect">Year</label>
          <select id="yearSelect"></select>
        </div>
        <div class="control">
          <label for="positionSelect">Position</label>
          <select id="positionSelect"></select>
        </div>
        <div class="hero-filter-row">
          <div class="control search-wrap">
            <label for="searchInput">Filter</label>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input id="searchInput" placeholder="Song, artist, or 2010-2015" />
          </div>
          <button class="hero-random-btn" id="randomCurrentBtn" title="Play a random track from the current filters" aria-label="Play a random track from the current filters"><span class="btn-label">⤮</span><span class="btn-spinner" aria-hidden="true"></span></button>
          <button class="hero-random-btn" id="randomAllBtn" title="Jump to a random year, position and track" aria-label="Jump to a random year, position and track"><span class="btn-label">✦</span><span class="btn-spinner" aria-hidden="true"></span></button>
        </div>
        <div class="position-quick-picks" id="positionQuickPicks">
          <button class="quick-pill active" type="button" data-position-quick="ALL" aria-pressed="true">All Positions</button>
          <button class="quick-pill" type="button" data-position-quick="TOP_10" aria-pressed="false">Top 10</button>
          <button class="quick-pill" type="button" data-position-quick="TOP_5" aria-pressed="false">Top 5</button>
          <button class="quick-pill" type="button" data-peak-week-toggle="true" aria-pressed="false">Peak Week</button>
        </div>
      </div>
    </section>

    <section class="panel summary">
      <div class="summary-copy">
        <strong id="summaryTitle">Loading…</strong>
        <span id="summarySub">Choose a year and chart position.</span>
        <div class="summary-filters" id="summaryFilters" hidden></div>
      </div>
      <div class="toolbar"></div>
    </section>

    <section class="results" id="results"></section>
  </div>

  <div class="modal-backdrop" id="spotifyModal" hidden>
    <section class="panel auth-grid modal-card" role="dialog" aria-modal="true" aria-labelledby="spotifyModalTitle">
      <div class="modal-header">
        <div>
          <strong id="spotifyModalTitle">Spotify playback</strong>
          <div class="tiny">Connect your Premium account for full controls</div>
          <div class="tiny" id="version-code">Version: 1.37-debug</div>
        </div>
        <button class="icon-btn" id="closeSpotifyModalBtn" aria-label="Close Spotify panel">✕</button>
      </div>
      <div class="status-row">
        <div class="status-pill" id="authStatus">Not signed in</div>
        <div class="status-pill" id="sdkStatus">SDK not ready</div>
        <div class="status-pill" id="deviceStatus">No active device</div>
      </div>
      <div class="meta">
        <button class="btn-primary" id="loginBtn">Sign in to Spotify</button>
        <button class="btn-secondary" id="logoutBtn">Sign out</button>
      </div>
    </section>
  </div>

  <div class="player-shell" id="playerShell" hidden>
    <div class="player-minibar" id="playerMinibar" aria-label="Show player" title="Show player">
      <div class="minibar-cover"><img id="minibarCoverImg" alt="Album artwork" hidden /><span id="minibarCoverFallback">♪</span></div>
      <div class="minibar-text">
        <strong id="minibarSong">No track selected</strong>
        <span id="minibarArtist"></span>
      </div>
      <div class="minibar-cue">▴</div>
    </div>

    <div class="player-toprow">
      <div class="player-cover"><img id="playerCoverImg" alt="Album artwork" hidden /><span id="playerCoverFallback">♪</span></div>
      <div class="player-main">
        <div class="player-header">
          <div class="player-title">
            <strong id="playerSong" class="marquee-line">No track selected</strong>
            <span id="playerArtist" class="marquee-line"></span>
          </div>
          <button class="icon-btn" id="closePlayerBtn" aria-label="Minimize player">✕</button>
        </div>
        <div class="player-progress-wrap">
          <span class="time" id="currentTime">0:00</span>
          <input type="range" id="progressBar" min="0" max="1000" value="0" step="1" />
          <span class="time" id="durationTime">0:00</span>
        </div>
        <div class="player-controls-pro">

  <script>
    const DATA_BASE = './out/year-json';

    const state = {

    const DEBUG_RESTORE = true;

    function getDebugStateSnapshot(extra = {}) {
      const derived = getDerivedPlaybackPosition ? getDerivedPlaybackPosition() : { position: 0, duration: 0 };
      return {
        ts: new Date().toISOString(),
        activeTrackSid: state.activeTrack?.sid || null,

    function debugRestore(label, extra = {}) {

      const entry = {
        label,
        ...getDebugStateSnapshot(extra),
      };
      window.__ukRestoreDebugLog.push(entry);
      console.log('[restore-debug]', entry);
    }

    function qs(name) { return new URLSearchParams(window.location.search).get(name); }
    function setStatus(el, text, kind = '') { el.textContent = text; el.className = 'status-pill' + (kind ? ` ${kind}` : ''); }

    function setRandomButtonsBusy(isBusy) {
      state.randomActionInFlight = isBusy;
      [randomCurrentBtn, randomAllBtn].forEach(btn => {
        if (!btn) return;
        btn.disabled = isBusy;
        btn.classList.toggle('is-busy', isBusy);
      });
    }

    function showTransientSummaryNotice(message, timeout = 3000) {
      summarySub.textContent = message;
      if (state.transientNoticeTimer) clearTimeout(state.transientNoticeTimer);
      state.transientNoticeTimer = setTimeout(() => {
        state.transientNoticeTimer = null;
        render();
      }, timeout);
    }

    async function withSingleRetry(action) {
      try {
        return await action();
      } catch (err) {
        console.warn('Retrying after load failure', err);
        await new Promise(resolve => setTimeout(resolve, 250));
        return await action();
      }
    }

    function formatWeek(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function ordinal(n) {
      const num = Number(n);
      if (num % 100 >= 11 && num % 100 <= 13) return `${num}th`;
      if (num % 10 === 1) return `${num}st`;
      if (num % 10 === 2) return `${num}nd`;
      if (num % 10 === 3) return `${num}rd`;
      return `${num}th`;
    }
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    function formatMs(ms) {
      const totalSeconds = Math.max(0, Math.floor((ms || 0) / 1000));
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return `${mins}:${String(secs).padStart(2, '0')}`;
    }
    function setProgress(positionMs = 0, durationMs = 0) {
      const safeDuration = Math.max(0, durationMs || 0);
      const safePosition = Math.max(0, positionMs || 0);
      currentTime.textContent = formatMs(safePosition);
      durationTime.textContent = formatMs(safeDuration);
      progressBar.max = String(safeDuration || 1000);
      progressBar.value = String(Math.min(safePosition, safeDuration || 1000));
    }
    function setMarqueeText(el, text) {
      const safeText = text || '';
      let inner = el.querySelector('.marquee-text');
      if (!inner) {
        inner = document.createElement('span');
        inner.className = 'marquee-text';
        el.textContent = '';
        el.appendChild(inner);
      }

      inner.textContent = safeText;
      el.setAttribute('data-full-text', safeText);
      el.setAttribute('aria-label', safeText);
      el.classList.remove('is-overflowing');
      el.style.removeProperty('--marquee-distance');
      el.style.removeProperty('--marquee-duration');

      const measureToken = String((Number(el.dataset.measureToken || '0') + 1));
      el.dataset.measureToken = measureToken;

      requestAnimationFrame(() => {
        if (el.dataset.measureToken !== measureToken) return;
        const currentInner = el.querySelector('.marquee-text');
        if (!currentInner) return;

        const overflow = Math.ceil(currentInner.scrollWidth - el.clientWidth);
        if (overflow > 2) {
          const distance = overflow + 40;
          const duration = Math.max(8, distance / 24);
          el.style.setProperty('--marquee-distance', `${distance}px`);
          el.style.setProperty('--marquee-duration', `${duration}s`);
          el.classList.add('is-overflowing');
        }
      });
    }

    function syncPlayerTitles(song, artist) {
      setMarqueeText(playerSong, song);
      setMarqueeText(playerArtist, artist);
      minibarSong.textContent = song;
      minibarArtist.textContent = artist;
    }

    function refreshPlayerMarquee() {
      const currentSong = playerSong.getAttribute('data-full-text') || '';
      const currentArtist = playerArtist.getAttribute('data-full-text') || '';
      setMarqueeText(playerSong, currentSong);
      setMarqueeText(playerArtist, currentArtist);
    }
    function setPlayerArtwork(url, fallbackText = '♪') {
      if (url) {
        playerCoverImg.src = url;
        playerCoverImg.hidden = false;
        playerCoverFallback.hidden = true;
        minibarCoverImg.src = url;
        minibarCoverImg.hidden = false;
        minibarCoverFallback.hidden = true;
      } else {
        playerCoverImg.hidden = true;
        playerCoverImg.removeAttribute('src');
        playerCoverFallback.hidden = false;
        playerCoverFallback.textContent = fallbackText;
        minibarCoverImg.hidden = true;
        minibarCoverImg.removeAttribute('src');
        minibarCoverFallback.hidden = false;
        minibarCoverFallback.textContent = fallbackText;
      }
    }
    function updatePlayerVisibility() {
      playerShell.classList.toggle('minimized', state.isPlayerMinimized);
    }
    function updateTogglePlayButton() {
      const paused = !state.playbackState || state.playbackState.paused;
      togglePlayBtn.textContent = paused ? '▶' : '❚❚';
      togglePlayBtn.setAttribute('aria-label', paused ? 'Play' : 'Pause');
    }
    function stopProgressTimer() {
      if (state.progressTimer) {
        clearInterval(state.progressTimer);
        state.progressTimer = null;
      }
    }
    function getDerivedPlaybackPosition() {
      const snapshot = state.lastPlaybackSnapshot;
      if (!snapshot) return { position: 0, duration: 0 };
      const track = snapshot.track_window?.current_track;
      const duration = track?.duration_ms || 0;
      const basePosition = snapshot.position || 0;
      if (snapshot.paused || !state.lastPlaybackTimestamp) {
        return { position: Math.min(basePosition, duration), duration };
      }
      const elapsed = Date.now() - state.lastPlaybackTimestamp;
      return { position: Math.min(basePosition + elapsed, duration), duration };
    }
    function refreshProgressFromSnapshot() {
      const { position, duration } = getDerivedPlaybackPosition();
      setProgress(position, duration);
    }
    function startProgressTimer() {
      stopProgressTimer();
      state.progressTimer = setInterval(() => {
        if (!state.lastPlaybackSnapshot || state.lastPlaybackSnapshot.paused || state.isScrubbing) return;
        refreshProgressFromSnapshot();
        maybeAutoAdvanceFromTimer();
      }, 250);
    }
    function getOpenSpotifyUrl() {
      const uri = state.playbackState?.track_window?.current_track?.uri;
      if (uri && uri.startsWith('spotify:track:')) {
        const trackId = uri.split(':')[2];
        return `https://open.spotify.com/track/${trackId}`;
      }
      return state.activeTrack?.spotifyUrl || null;
    }

    function getPlaybackStateTrackId(playbackState) {
      const uri = playbackState?.track_window?.current_track?.uri;
      return uri && uri.startsWith('spotify:track:') ? uri.split(':')[2] : null;
    }

    function getCurrentTrackId() {
      return state.currentTrackSid || getPlaybackStateTrackId(state.playbackState);
    }

    function getPlayableVisibleRows() {
      const rows = getVisibleRows();
      const unique = [];
      const seenSids = new Set();

      for (const row of rows) {
        if (!row?.sid) continue;
        if (seenSids.has(row.sid)) continue;
        seenSids.add(row.sid);
        unique.push(row);
      }

      return unique;
    }

    function getPlayableQueueIndexForRow(targetRow) {
      if (!targetRow?.sid) return -1;
      return getPlayableVisibleRows().findIndex(row => row.sid === targetRow.sid);
    }

    async function maybeAutoAdvanceFromTimer() {
      if (state.autoAdvanceInFlight || state.isScrubbing) return;
      if (state.pendingRequestedTrackSid) return;

      const currentSid = getCurrentTrackId();
      if (!currentSid) return;

      const { position, duration } = getDerivedPlaybackPosition();
      if (!(duration > 0 && position >= Math.max(0, duration - 1200))) return;
      if (state.lastAutoAdvancedFromSid === currentSid) return;

      const playableRows = getPlayableVisibleRows();
      if (!playableRows.length) return;

      const currentIndex = playableRows.findIndex(row => row.sid === currentSid);
      if (currentIndex < 0 || currentIndex >= playableRows.length - 1) return;

      const nextRow = playableRows[currentIndex + 1];
      if (!nextRow?.sid) return;

      state.autoAdvanceInFlight = true;

      try {
        if (state.randomPinnedKey) {
          state.randomPinnedKey = rowKey(nextRow);
          render();
        }

        await playTrack(nextRow, { isAutoAdvance: true, forceRestart: true });
        await new Promise(resolve => setTimeout(resolve, 500));
        await ensurePendingTrackIsActuallyPlaying();

        state.lastAutoAdvancedFromSid = currentSid;
      } catch (err) {
        console.error('Auto-advance failed', err);
      } finally {
        window.setTimeout(() => {
          state.autoAdvanceInFlight = false;
        }, 1200);
      }
    }

    function pickRandomItem(items) {
      if (!items.length) return null;
      return items[Math.floor(Math.random() * items.length)];
    }
    function rowKey(row) {
      return [row.w || row.weekEnding || '', row.sid || '', row.tm || row.t || row.title || '', row.am || row.a || row.artist || '', row.__position || ''].join('|');
    }

    function findRowBySavedState(saved) {
      const rows = getRowsForSelectedPosition();

      if (saved.activeTrackRowKey) {
        const byRowKey = rows.find(row => rowKey(row) === saved.activeTrackRowKey);
        if (byRowKey) return byRowKey;
      }

      if (saved.activeTrackSid) {
        const bySid = rows.find(row => row.sid === saved.activeTrackSid);
        if (bySid) return bySid;
      }

      return null;
    }

    function parseSearchFilters(rawTerm) {
      const source = String(rawTerm || '').trim();
      if (!source) return { textTerm: '', yearStart: null, yearEnd: null };

      const yearRangeMatch = source.match(/\b((?:19|20)\d{2})\s*(?:-|to)\s*((?:19|20)\d{2})\b/i);
      if (!yearRangeMatch) {
        return { textTerm: source.toLowerCase(), yearStart: null, yearEnd: null };
      }

      const a = Number(yearRangeMatch[1]);
      const b = Number(yearRangeMatch[2]);
      const yearStart = Math.min(a, b);
      const yearEnd = Math.max(a, b);
      const textTerm = source.replace(yearRangeMatch[0], ' ').replace(/\s+/g, ' ').trim().toLowerCase();
      return { textTerm, yearStart, yearEnd };
    }

    function getRowYear(row) {
      const raw = row?.w || row?.weekEnding || '';
      if (raw) {
        const parsed = new Date(raw);
        if (!Number.isNaN(parsed.getTime())) return parsed.getFullYear();
        const match = String(raw).match(/\b((?:19|20)\d{2})\b/);
        if (match) return Number(match[1]);
      }
      if (row?.__year) return Number(row.__year);
      if (state.currentYearData?.year && state.currentYearData.year !== 'ALL') return Number(state.currentYearData.year);
      return null;
    }

    function rowMatchesSearchFilters(row, filters) {
      const song = String(row.tm || row.t || row.title || '').toLowerCase();
      const artist = String(row.am || row.a || row.artist || '').toLowerCase();
      if (filters.yearStart !== null && filters.yearEnd !== null) {
        const rowYear = getRowYear(row);
        if (rowYear === null || rowYear < filters.yearStart || rowYear > filters.yearEnd) return false;
      }
      if (!filters.textTerm) return true;
      return song.includes(filters.textTerm) || artist.includes(filters.textTerm);
    }


    function getPositionLabel(value) {
      if (value === 'ALL') return 'All Positions';
      if (value === 'TOP_10') return 'Top 10';
      if (value === 'TOP_5') return 'Top 5';
      return ordinal(value);
    }

    function getTrackGroupKey(row) {
      if (row?.sid) return `sid:${row.sid}`;

      const tm = row?.tm;
      const am = row?.am;
      if (tm != null && am != null && String(tm) !== '' && String(am) !== '') {
        return `tm_am:${String(tm)}||${String(am)}`;
      }

      const t = row?.t;
      const a = row?.a;
      if (t != null && a != null && String(t) !== '' && String(a) !== '') {
        return `t_a:${String(t)}||${String(a)}`;
      }

      return null;
    }

    function comparePeakWeekRows(a, b) {
      const posA = Number(a?.__position ?? Number.POSITIVE_INFINITY);
      const posB = Number(b?.__position ?? Number.POSITIVE_INFINITY);
      if (posA !== posB) return posA - posB;

      const dateA = new Date(a?.w || a?.weekEnding || '').getTime();
      const dateB = new Date(b?.w || b?.weekEnding || '').getTime();
      const safeA = Number.isNaN(dateA) ? Number.POSITIVE_INFINITY : dateA;
      const safeB = Number.isNaN(dateB) ? Number.POSITIVE_INFINITY : dateB;
      return safeA - safeB;
    }

    function reduceRowsToPeakWeek(rows) {
      const grouped = new Map();
      const fallbackRows = [];

      for (const row of rows) {
        const key = getTrackGroupKey(row);
        if (!key) {
          fallbackRows.push(row);
          continue;
        }

        const current = grouped.get(key);
        if (!current || comparePeakWeekRows(row, current) < 0) {
          grouped.set(key, row);
        }
      }

      const reduced = [...grouped.values(), ...fallbackRows];
      reduced.sort(comparePeakWeekRows);
      return reduced;
    }

    function buildOverallPeakMap() {
      const peakMap = new Map();
      const allRows = getRowsForSelectedPosition();

      for (const row of allRows) {
        const key = getTrackGroupKey(row);
        if (!key) continue;

        const pos = Number(row.__position);
        if (!Number.isFinite(pos)) continue;

        const currentBest = peakMap.get(key);
        if (currentBest == null || pos < currentBest) {
          peakMap.set(key, pos);
        }
      }

      return peakMap;
    }

    function updatePositionQuickPicks() {
      if (!positionQuickPicks) return;

      Array.from(positionQuickPicks.querySelectorAll('[data-position-quick]')).forEach(btn => {
        const isActive = btn.dataset.positionQuick === state.selectedPosition;
        if (isActive) btn.classList.add('active');
        else btn.classList.remove('active');
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      const peakWeekBtn = positionQuickPicks.querySelector('[data-peak-week-toggle]');
      if (peakWeekBtn) {
        if (state.peakWeekOnly) peakWeekBtn.classList.add('active');
        else peakWeekBtn.classList.remove('active');
        peakWeekBtn.setAttribute('aria-pressed', state.peakWeekOnly ? 'true' : 'false');
      }
    }

    function renderSummaryFilterChips() {
      if (!summaryFilters) return;

      const filters = parseSearchFilters(state.searchTerm);
      const chips = [];

      if (state.selectedYear === 'ALL' && (filters.yearStart === null || filters.yearEnd === null)) {
        chips.push({ label: 'All Years', action: 'year' });
      }

      if (state.selectedPosition !== 'ALL') {
        chips.push({ label: getPositionLabel(state.selectedPosition), action: 'position' });
      }

      if (state.peakWeekOnly) {
        chips.push({ label: 'Peak Week', action: 'peakweek' });
      }

      if (filters.textTerm) {
        chips.push({ label: `Text: “${filters.textTerm}”`, action: 'text' });
      }

      if (filters.yearStart !== null && filters.yearEnd !== null) {
        chips.push({ label: `Years: ${filters.yearStart}–${filters.yearEnd}`, action: 'range' });
      }

      summaryFilters.hidden = chips.length === 0;
      summaryFilters.innerHTML = chips.map(chip => {
        const dismissible = chip.action === 'text' || chip.action === 'range';
        return `<span class="filter-chip">${escapeHtml(chip.label)}${
          dismissible ? `<button type="button" data-clear-filter="${chip.action}" aria-label="Clear ${escapeHtml(chip.label)}">×</button>` : ''
        }</span>`;
      }).join('');

    }

    function getRowsForSelectedPosition() {
      const positionsMap = state.currentYearData?.positions || {};
      if (state.selectedPosition === 'ALL' || state.selectedPosition === 'TOP_10' || state.selectedPosition === 'TOP_5') {
        const merged = [];
        const entries = Object.entries(positionsMap)
          .sort((a, b) => Number(a[0]) - Number(b[0]))
          .filter(([pos]) => {
            if (state.selectedPosition === 'TOP_5') return Number(pos) <= 5;
            if (state.selectedPosition === 'TOP_10') return Number(pos) <= 10;
            return true;
          });
        for (const [pos, rows] of entries) {
          for (const row of rows || []) {
            merged.push({ ...row, __position: pos, __year: state.currentYearData?.year && state.currentYearData.year !== 'ALL' ? state.currentYearData.year : undefined });
          }
        }
        return merged;
      }
      return (positionsMap[state.selectedPosition] || []).map(row => ({
        ...row,
        __position: state.selectedPosition,
        __year: state.currentYearData?.year && state.currentYearData.year !== 'ALL' ? state.currentYearData.year : undefined,
      }));
    }

    function getVisibleRows() {
      const rows = getRowsForSelectedPosition();
      if (state.randomPinnedKey) {
        return rows.filter(row => rowKey(row) === state.randomPinnedKey);
      }
      const filters = parseSearchFilters(state.searchTerm);
      const filteredRows = (!filters.textTerm && filters.yearStart === null)
        ? rows
        : rows.filter(row => rowMatchesSearchFilters(row, filters));

      return state.peakWeekOnly ? reduceRowsToPeakWeek(filteredRows) : filteredRows;
    }

    function getRowsForCurrentFilter() {
      const rows = getRowsForSelectedPosition();
      const filters = parseSearchFilters(state.searchTerm);
      const filteredRows = (!filters.textTerm && filters.yearStart === null)
        ? rows
        : rows.filter(row => rowMatchesSearchFilters(row, filters));

      return state.peakWeekOnly ? reduceRowsToPeakWeek(filteredRows) : filteredRows;
    }

    function formatFilterSummary() {
      const filters = parseSearchFilters(state.searchTerm);
      const parts = [];
      if (filters.textTerm) parts.push(`for “${filters.textTerm}”`);
      if (filters.yearStart !== null && filters.yearEnd !== null) parts.push(`in ${filters.yearStart}–${filters.yearEnd}`);
      return parts.join(' ');
    }

    function shouldUseRenderLimit(rows) {
      return !state.randomPinnedKey && rows.length > 150;
    }

    function getRenderRows(rows) {
      if (!shouldUseRenderLimit(rows)) return rows;
      return rows.slice(0, state.visibleRowLimit);
    }

    function clearPendingRequestedTrack() {
      state.pendingRequestedTrackSid = null;
      state.pendingRequestedAt = 0;
    }

    async function normalizePendingTrackStart(expectedSid) {
      debugRestore('normalizePendingTrackStart:start', { expectedSid });
      if (state.restoredPlayerStateOnly || state.restoreSeekTrackSid) return;

      await new Promise(resolve => setTimeout(resolve, 500));
      await ensurePendingTrackIsActuallyPlaying();

      const inRestoreSeekWindow =
        state.restoreSeekTrackSid &&
        expectedSid === state.restoreSeekTrackSid &&
        Date.now() < state.restoreSeekUntil;

      if (inRestoreSeekWindow) {
        return;
      }

      const currentSid = getCurrentTrackId();
      const { position } = getDerivedPlaybackPosition();

      if (expectedSid && currentSid === expectedSid && position > 1500 && state.deviceId) {
        debugRestore('normalizePendingTrackStart:seek-zero', {
          expectedSid,
          currentSid,
          position,
        });
        await spotifyApi(
          `https://api.spotify.com/v1/me/player/seek?position_ms=0&device_id=${encodeURIComponent(state.deviceId)}`,
          { method: 'PUT' }
        );

        state.lastPlaybackTimestamp = Date.now();
        if (state.lastPlaybackSnapshot) {
          state.lastPlaybackSnapshot = {
            ...state.lastPlaybackSnapshot,
            position: 0,
          };
        }
        refreshProgressFromSnapshot();
      }
    }

    function base64UrlEncode(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i += 1) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    async function sha256(plain) {
      const data = new TextEncoder().encode(plain);
      return crypto.subtle.digest('SHA-256', data);
    }
    function randomString(length = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let out = '';
      const array = new Uint8Array(length);
      crypto.getRandomValues(array);
      for (let i = 0; i < array.length; i += 1) out += chars[array[i] % chars.length];
      return out;
    }
    function saveTokens(tokens) { localStorage.setItem('spotify_tokens', JSON.stringify(tokens)); }
    function loadTokens() { try { return JSON.parse(localStorage.getItem('spotify_tokens') || 'null'); } catch { return null; } }
    function clearTokens() {
      localStorage.removeItem('spotify_tokens');
      localStorage.removeItem('spotify_pkce_verifier');
      state.accessToken = null;
      state.refreshToken = null;
      state.tokenExpiresAt = null;
    }

    async function startLogin() {
      if (!SPOTIFY_CLIENT_ID || SPOTIFY_CLIENT_ID.includes('REPLACE_WITH')) {
        alert('Set SPOTIFY_CLIENT_ID in the HTML first.');
        return;
      }

      saveAppUiStateForRestore();

      const verifier = randomString(64);
      const challenge = base64UrlEncode(await sha256(verifier));
      localStorage.setItem('spotify_pkce_verifier', verifier);
      const params = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        response_type: 'code',
        redirect_uri: REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: challenge,
        scope: SCOPES.join(' '),
      });
      window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const verifier = localStorage.getItem('spotify_pkce_verifier');
      if (!verifier) throw new Error('Missing PKCE verifier in localStorage.');
      const body = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier,
      });
      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
      });
      if (!res.ok) throw new Error(`Token exchange failed: ${await res.text()}`);
      const token = await res.json();
      const tokens = { access_token: token.access_token, refresh_token: token.refresh_token, expires_at: Date.now() + (token.expires_in * 1000) };
      saveTokens(tokens);
      state.accessToken = tokens.access_token;
      state.refreshToken = tokens.refresh_token;
      state.tokenExpiresAt = tokens.expires_at;
      const url = new URL(window.location.href);
      url.searchParams.delete('code');
      url.searchParams.delete('state');
      window.history.replaceState({}, '', url);
    }

    async function refreshAccessToken() {
      if (!state.refreshToken) return;
      const body = new URLSearchParams({ client_id: SPOTIFY_CLIENT_ID, grant_type: 'refresh_token', refresh_token: state.refreshToken });
      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body,
      });
      if (!res.ok) {
        clearTokens();
        updateAuthUi();
        throw new Error('Could not refresh Spotify token.');
      }
      const token = await res.json();
      const tokens = { access_token: token.access_token, refresh_token: token.refresh_token || state.refreshToken, expires_at: Date.now() + (token.expires_in * 1000) };
      saveTokens(tokens);
      state.accessToken = tokens.access_token;
      state.refreshToken = tokens.refresh_token;
      state.tokenExpiresAt = tokens.expires_at;
    }

    async function getValidAccessToken() {
      if (!state.accessToken || !state.tokenExpiresAt || Date.now() > state.tokenExpiresAt - 60000) await refreshAccessToken();
      return state.accessToken;
    }

    const APP_STATE_KEY = 'uk_chart_browser_restore_state';

      const derived = getDerivedPlaybackPosition();
      const payload = {
        selectedYear: state.selectedYear,
        selectedPosition: state.selectedPosition,
        selectedPositionLabel: state.selectedPositionLabel,
        searchTerm: state.searchTerm,
        randomPinnedKey: state.randomPinnedKey,
        visibleRowLimit: state.visibleRowLimit,
        peakWeekOnly: state.peakWeekOnly,
        spotifyModalOpen: !spotifyModal.hidden,
        activeTrackSid: state.activeTrack?.sid || null,
        activeTrackRowKey: state.activeTrack ? rowKey(state.activeTrack) : null,
        activeTrackTitle: state.activeTrack?.tm || state.activeTrack?.t || state.activeTrack?.title || '',
        activeTrackArtist: state.activeTrack?.am || state.activeTrack?.a || state.activeTrack?.artist || '',
        activeTrackArtworkUrl:
          state.playbackState?.track_window?.current_track?.album?.images?.[0]?.url ||
          playerCoverImg.getAttribute('src') ||
          minibarCoverImg.getAttribute('src') ||
          null,
        playerVisible: !playerShell.hidden,
        playerMinimized: !!state.isPlayerMinimized,
        playbackPaused: !!state.playbackState?.paused,
        // If the SDK reconnect zeroed out the snapshot position before we got
        // here, fall back to the position we captured at visibilitychange:hidden.
        playbackPositionMs: derived.position || state.positionAtPageHide || 0,
        playbackDurationMs: derived.duration ||
          state.playbackState?.track_window?.current_track?.duration_ms ||
          state.lastPlaybackSnapshot?.track_window?.current_track?.duration_ms ||
          0,
        positionAtPageHide: state.positionAtPageHide || 0,
        savedAt: Date.now(),
      };
      debugRestore('saveAppUiStateForRestore', payload);
      sessionStorage.setItem(APP_STATE_KEY, JSON.stringify(payload));
    }

    function loadAppUiStateForRestore() {
      try {
        return JSON.parse(sessionStorage.getItem(APP_STATE_KEY) || 'null');
      } catch {
        return null;
      }
    }

    function clearAppUiStateRestore() {
      sessionStorage.removeItem(APP_STATE_KEY);
    }

    async function restoreAppUiStateAfterLogin() {
      const saved = loadAppUiStateForRestore();
      debugRestore('restoreAppUiStateAfterLogin:start', { saved });
      if (!saved) return;

      clearAppUiStateRestore();

      if (saved.selectedYear && state.availableYears.includes(saved.selectedYear)) {
        state.selectedYear = saved.selectedYear;
        yearSelect.value = saved.selectedYear;
        await loadYear(saved.selectedYear);
      }

      if (saved.selectedPosition) {
        state.selectedPosition = saved.selectedPosition;
        positionSelect.value = saved.selectedPosition;
        state.selectedPositionLabel =
          saved.selectedPositionLabel ||
          positionSelect.options[positionSelect.selectedIndex]?.text ||
          'All Positions';
      }

      state.searchTerm = saved.searchTerm || '';
      searchInput.value = state.searchTerm;

      state.randomPinnedKey = saved.randomPinnedKey || null;
      state.visibleRowLimit = Number(saved.visibleRowLimit) || 150;
      state.peakWeekOnly = !!saved.peakWeekOnly;

      updatePositionQuickPicks();
      render();

      const restoredTrack = findRowBySavedState(saved);
      if (restoredTrack && saved.playerVisible) {
        state.activeTrack = restoredTrack;
        state.isPlayerMinimized = !!saved.playerMinimized;
        state.currentTrackSid = null;
        state.restoredPlayerStateOnly = true;

        syncPlayerTitles(
          restoredTrack.tm || restoredTrack.t || restoredTrack.title || saved.activeTrackTitle || 'Unknown song',
          restoredTrack.am || restoredTrack.a || restoredTrack.artist || saved.activeTrackArtist || ''
        );

        setPlayerArtwork(
          saved.activeTrackArtworkUrl || null,
          (restoredTrack.tm || restoredTrack.t || restoredTrack.title || '♪').slice(0, 1).toUpperCase()
        );

        const restoredPosition = Number(saved.playbackPositionMs) || Number(saved.positionAtPageHide) || 0;
        const restoredDuration = Number(saved.playbackDurationMs) || 0;

        const restoredTitle =
          restoredTrack.tm || restoredTrack.t || restoredTrack.title || saved.activeTrackTitle || 'Unknown song';

        const restoredArtist =
          restoredTrack.am || restoredTrack.a || restoredTrack.artist || saved.activeTrackArtist || '';

        const restoredArtworkUrl = saved.activeTrackArtworkUrl || null;

        const syntheticCurrentTrack = {
          uri: restoredTrack.sid ? `spotify:track:${restoredTrack.sid}` : undefined,
          name: restoredTitle,
          duration_ms: restoredDuration,
          artists: restoredArtist ? restoredArtist.split(',').map(name => ({ name: name.trim() })) : [],
          album: {
            images: restoredArtworkUrl ? [{ url: restoredArtworkUrl }] : [],
          },
        };

        state.playbackState = {
          ...(state.playbackState || {}),
          paused: true,
          position: restoredPosition,
          track_window: {
            current_track: syntheticCurrentTrack,
          },
        };

        state.lastPlaybackSnapshot = {
          ...(state.lastPlaybackSnapshot || {}),
          paused: true,
          position: restoredPosition,
          track_window: {
            current_track: syntheticCurrentTrack,
          },
        };

        state.lastPlaybackTimestamp = 0;

        setProgress(restoredPosition, restoredDuration);
        debugRestore('restoreAppUiStateAfterLogin:restored-ui', {
          restoredTrackSid: restoredTrack.sid || null,
          restoredPosition,
          restoredDuration,
        });
        updateTogglePlayButton();
        playerInfo.textContent = 'Paused';
        playerShell.hidden = false;
        updatePlayerVisibility();
      }

      if (saved.spotifyModalOpen) {

      }
    }

    function shouldIgnoreStaleRestoreState(playbackState) {
      const incomingTrackId = getPlaybackStateTrackId(playbackState);
      const incomingPosition = playbackState?.position || 0;
      const target = state.restoreSeekTargetMs || 0;

      const inRestoreSeekWindow =
        state.restoreSeekTrackSid &&
        incomingTrackId === state.restoreSeekTrackSid &&
        Date.now() < state.restoreSeekUntil;

      if (!inRestoreSeekWindow) return false;
      if (target < 2000) return false;

      return incomingPosition < Math.max(1000, target - 1500);
    }

    function updateAuthUi() {
      setStatus(authStatus, state.accessToken ? 'Signed in' : 'Not signed in', state.accessToken ? 'ok' : 'warn');
      setStatus(sdkStatus, state.sdkReady ? 'SDK ready' : 'SDK not ready', state.sdkReady ? 'ok' : 'warn');
      setStatus(deviceStatus, state.deviceId ? 'Device ready' : 'No active device', state.deviceId ? 'ok' : 'warn');

      if (spotifyStatusPill) {

        spotifyStatusPill.classList.toggle('connected', !!state.accessToken);

    async function waitForDeviceReady(timeoutMs = 3000) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (state.deviceId) return true;
        await new Promise(resolve => setTimeout(resolve, 100));
      }
      return false;
    }

    async function rebuildSpotifyPlayer() {
      try {
        if (state.player) {
          try { await state.player.disconnect(); } catch {}
        }
      } finally {
        state.player = null;
        state.deviceId = null;
        state.sdkReady = false;
        updateAuthUi();
      }

      await setupSpotifyPlayer();
      const ready = await waitForDeviceReady(8000);
      return ready;
    }

    function isRecoverableDeviceError(err) {
      const message = String(err?.message || err || '');
      return /device not found|no active device|NO_ACTIVE_DEVICE/i.test(message);
    }

    async function recoverDeviceAndRetry(action) {
      try {
        return await action();
      } catch (err) {
        if (!isRecoverableDeviceError(err)) {
          throw err;
        }

        const rebuilt = await rebuildSpotifyPlayer();
        if (!rebuilt) {
          saveAppUiStateForRestore();
          await startLogin();
          return;
        }

        try {
          return await action();
        } catch (retryErr) {
          if (isRecoverableDeviceError(retryErr)) {
            saveAppUiStateForRestore();
            await startLogin();
            return;
          }
          throw retryErr;
        }
      }
    }
