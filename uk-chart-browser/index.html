    async function loadIndex() {
      const res = await fetch(`${DATA_BASE}/index.json?ts=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Could not load index.json (${res.status})`);
      const index = await res.json();
      const years = (index.years || []).map(y => String(y.year)).sort((a, b) => Number(b) - Number(a));
      state.availableYears = ['ALL', ...years];
      if (!state.availableYears.includes(state.selectedYear)) state.selectedYear = state.availableYears[0] || 'ALL';
      yearSelect.innerHTML = state.availableYears.map(y => `<option value="${y}">${y === 'ALL' ? 'All Years' : y}</option>`).join('');
      yearSelect.value = state.selectedYear;
      await loadYear(state.selectedYear);
    }

    async function loadYear(year) {
      const requestId = ++state.loadYearRequestId;

      summaryTitle.textContent = `Loading ${year === 'ALL' ? 'all years' : year}…`;
      summarySub.textContent = 'Fetching chart data';
      resultsEl.innerHTML = `<div class="loading">Loading ${escapeHtml(year === 'ALL' ? 'all years' : year)} chart data…</div>`;

      let nextYearData;

      if (year === 'ALL') {
        const allYears = state.availableYears.filter(y => y !== 'ALL');
        const merged = { year: 'ALL', weeks: [], minPosition: null, maxPosition: null, positions: {} };
        const weekSet = new Set();

        const yearDataList = await Promise.all(
          allYears.map(async y => {
            const res = await fetch(`${DATA_BASE}/${y}.json?ts=${Date.now()}`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`Could not load ${y}.json (${res.status})`);
            return res.json();
          })
        );

        for (const data of yearDataList) {
          for (const w of data.weeks || []) weekSet.add(w);
          if (merged.minPosition === null || (data.minPosition ?? 9999) < merged.minPosition) merged.minPosition = data.minPosition;
          if (merged.maxPosition === null || (data.maxPosition ?? 0) > merged.maxPosition) merged.maxPosition = data.maxPosition;

          for (const [pos, rows] of Object.entries(data.positions || {})) {
            if (!merged.positions[pos]) merged.positions[pos] = [];
            merged.positions[pos].push(...rows);
          }
        }

        merged.weeks = Array.from(weekSet).sort();
        for (const pos of Object.keys(merged.positions)) {
          merged.positions[pos].sort((a, b) => String(a.w || '').localeCompare(String(b.w || '')));
        }
        nextYearData = merged;
      } else {
        const res = await fetch(`${DATA_BASE}/${year}.json?ts=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Could not load ${year}.json (${res.status})`);
        nextYearData = await res.json();
      }

      if (requestId !== state.loadYearRequestId) return;

      state.currentYearData = nextYearData;

      const positions = Object.keys(state.currentYearData?.positions || {}).sort((a, b) => Number(a) - Number(b));
      positionSelect.innerHTML = [
        `<option value="ALL">All Positions</option>`,
        `<option value="TOP_10">Top 10</option>`,
        `<option value="TOP_5">Top 5</option>`,
        ...positions.map(pos => `<option value="${pos}">${ordinal(pos)}</option>`)
      ].join('');
      if (!["ALL", "TOP_10", "TOP_5", ...positions].includes(state.selectedPosition)) state.selectedPosition = 'ALL';
      positionSelect.value = state.selectedPosition;
      state.selectedPositionLabel = positionSelect.options[positionSelect.selectedIndex]?.text || 'All Positions';
      state.currentPlayableIndex = -1;
      state.visibleRowLimit = 150;
      updatePositionQuickPicks();
      render();
    }

    async function spotifyApi(url, options = {}) {
      const token = await getValidAccessToken();
      const headers = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...(options.headers || {}) };
      debugRestore('spotifyApi:request', {
        url,
        method: options?.method || 'GET',
        body: options?.body || null,
      });
      const res = await fetch(url, { ...options, headers });
      debugRestore('spotifyApi:response', {
        url,
        method: options?.method || 'GET',
        status: res.status,
        ok: res.ok,
      });
      if (!res.ok && res.status !== 204) throw new Error(await res.text() || `Spotify API error ${res.status}`);
      return res;
    }

    async function transferPlaybackHere() {
      if (!state.deviceId) throw new Error('No Spotify Web Playback device available yet.');
      await spotifyApi('https://api.spotify.com/v1/me/player', {
        method: 'PUT',
        body: JSON.stringify({ device_ids: [state.deviceId], play: false })
      });
      setStatus(deviceStatus, `Device ready`, 'ok');
    }

    async function playTrack(row, options = {}) {
      if (!row.sid) return;
      if (!options.isAutoAdvance) {
        state.lastAutoAdvancedFromSid = null;
      }

      const queueIndex = getPlayableQueueIndexForRow(row);
      if (queueIndex >= 0) {
        state.currentPlayableIndex = queueIndex;
      }

      if (!state.player || !state.deviceId) {
        alert('Spotify player is not ready yet. Sign in and wait for the device to be ready.');
        return;
      }

      const currentTrackId = getPlaybackStateTrackId(state.playbackState);
      const isSwitchingTrack = currentTrackId !== row.sid;
      const mustHardReset = isSwitchingTrack || options.forceRestart;

      state.activeTrack = row;
      state.pendingRequestedTrackSid = row.sid;
      state.pendingRequestedAt = Date.now();

      await state.player.activateElement();
      await transferPlaybackHere();

      if (mustHardReset && !options.skipInitialSeekReset) {
        try {
          await new Promise(resolve => setTimeout(resolve, 150));
          await spotifyApi(`https://api.spotify.com/v1/me/player/seek?position_ms=0&device_id=${encodeURIComponent(state.deviceId)}`, {
            method: 'PUT',
          });
        } catch (err) {
          console.warn('Seek reset failed', err);
        }
      }

      await spotifyApi(`https://api.spotify.com/v1/me/player/play?device_id=${encodeURIComponent(state.deviceId)}`, {
        method: 'PUT',
        body: JSON.stringify({ uris: [`spotify:track:${row.sid}`], position_ms: 0 }),
      });

      if (mustHardReset) {
        try {
          await new Promise(resolve => setTimeout(resolve, 150));
          await spotifyApi(`https://api.spotify.com/v1/me/player/seek?position_ms=0&device_id=${encodeURIComponent(state.deviceId)}`, {
            method: 'PUT',
          });
        } catch (err) {
          console.warn('Seek reset failed', err);
        }
      }

      state.lastPlaybackTimestamp = Date.now();
      syncPlayerTitles(row.tm || row.t || row.title || 'Unknown song', row.am || row.a || row.artist || '');
      playerInfo.textContent = 'Playback requested on your Web Playback SDK device.';
      setPlayerArtwork(null, (row.tm || row.t || row.title || '♪').slice(0, 1).toUpperCase());
      if (!options.skipInitialSeekReset) {
        setProgress(0, 0);
      }
      playerShell.hidden = false;
      updatePlayerVisibility();
    }

    async function ensurePendingTrackIsActuallyPlaying() {
      debugRestore('ensurePendingTrackIsActuallyPlaying:start', {
        expectedSid,
        actualSid,
        position,
      });
      if (state.restoreSeekTrackSid || state.restoredPlayerStateOnly) return;
      const expectedSid = state.pendingRequestedTrackSid;
      const actualSid = getCurrentTrackId();
      const { position } = getDerivedPlaybackPosition();

      if (!expectedSid) return;
      if (actualSid === expectedSid && position > 1500) {
        clearPendingRequestedTrack();
        return;
      }

      const inRestoreSeekWindow =
        state.restoreSeekTrackSid &&
        expectedSid === state.restoreSeekTrackSid &&
        Date.now() < state.restoreSeekUntil;

      if (
        expectedSid &&
        actualSid === expectedSid &&
        state.playbackState?.paused &&
        position < 1500 &&
        state.deviceId
      ) {
        try {
          if (inRestoreSeekWindow && state.restoreSeekTargetMs > 0) {
            debugRestore('ensurePendingTrackIsActuallyPlaying:plain-play', {
              expectedSid,
              actualSid,
              position,
            });
            await spotifyApi(
              `https://api.spotify.com/v1/me/player/play?device_id=${encodeURIComponent(state.deviceId)}`,
              { method: 'PUT' }
            );
          } else {
            debugRestore('ensurePendingTrackIsActuallyPlaying:play-with-position-0', {
              expectedSid,
              actualSid,
              position,
            });
            await spotifyApi(
              `https://api.spotify.com/v1/me/player/play?device_id=${encodeURIComponent(state.deviceId)}`,
              {
                method: 'PUT',
                body: JSON.stringify({
                  uris: [`spotify:track:${expectedSid}`],
                  position_ms: 0,
                }),
              }
            );
          }
        } catch (err) {
          console.warn('Pending-track start kick failed', err);
        }
      }
    }

    async function pausePlayback() {
      clearPendingRequestedTrack();
      state.restoreSeekTrackSid = null;
      state.restoreSeekTargetMs = 0;
      state.restoreSeekUntil = 0;
      state.restoredPlayerStateOnly = false;
      await spotifyApi('https://api.spotify.com/v1/me/player/pause', { method: 'PUT' });
    }
    async function resumePlayback() {
      if (!state.deviceId) return;
      await spotifyApi(`https://api.spotify.com/v1/me/player/play?device_id=${encodeURIComponent(state.deviceId)}`, { method: 'PUT' });
    }

    async function togglePlayback() {
      debugRestore('togglePlayback:start');
      const shouldRehydrateRestoredTrack =
        state.restoredPlayerStateOnly &&
        state.activeTrack &&
        (!state.playbackState || state.playbackState.paused);

      if (shouldRehydrateRestoredTrack) {
        debugRestore('togglePlayback:resumeRestoredTrack');
        await resumeRestoredTrack();
        return;
      }

      if (!state.playbackState || state.playbackState.paused) {
        debugRestore('togglePlayback:resumePlayback');
        await resumePlayback();
      } else {
        debugRestore('togglePlayback:pausePlayback');
        await pausePlayback();
      }
    }

    async function resumeRestoredTrack() {
      debugRestore('resumeRestoredTrack:start');

      if (!state.activeTrack?.sid || !state.deviceId) {
        debugRestore('resumeRestoredTrack:missing-track-or-device');
        return;
      }

      const restorePosition = Math.max(0,
        state.lastPlaybackSnapshot?.position ||
        state.positionAtPageHide ||
        0
      );
      const trackSid = state.activeTrack.sid;

      state.restoreResumeInFlight = true;

      try {
        state.restoreSeekTrackSid = trackSid;
        state.restoreSeekTargetMs = restorePosition;
        state.restoreSeekUntil = Date.now() + 5000;
        state.pendingRequestedTrackSid = trackSid;
        state.pendingRequestedAt = Date.now();

        await recoverDeviceAndRetry(async () => {
          debugRestore('resumeRestoredTrack:before-activateElement', { restorePosition, trackSid });
          await state.player.activateElement();

          debugRestore('resumeRestoredTrack:before-transferPlaybackHere', { restorePosition, trackSid });
          await transferPlaybackHere();

          debugRestore('resumeRestoredTrack:before-play-request', { restorePosition, trackSid });
          await spotifyApi(
            `https://api.spotify.com/v1/me/player/play?device_id=${encodeURIComponent(state.deviceId)}`,
            {
              method: 'PUT',
              body: JSON.stringify({
                uris: [`spotify:track:${trackSid}`],
                position_ms: restorePosition,
              }),
            }
          );
          debugRestore('resumeRestoredTrack:after-play-request', { restorePosition, trackSid });
        });

        state.lastPlaybackTimestamp = Date.now();

        if (state.lastPlaybackSnapshot) {
          state.lastPlaybackSnapshot = {
            ...state.lastPlaybackSnapshot,
            position: restorePosition,
            paused: false,
          };
        }

        if (state.playbackState) {
          state.playbackState = {
            ...state.playbackState,
            position: restorePosition,
            paused: false,
          };
        }

        debugRestore('resumeRestoredTrack:local-state-updated', {
          restorePosition,
          playbackStatePosition: state.playbackState?.position || 0,
          snapshotPosition: state.lastPlaybackSnapshot?.position || 0,
          playbackPaused: !!state.playbackState?.paused,
          snapshotPaused: !!state.lastPlaybackSnapshot?.paused,
        });

        clearPendingRequestedTrack();
        state.restoredPlayerStateOnly = false;
        refreshProgressFromSnapshot();
        updateTogglePlayButton();
      } finally {
        // do not clear restoreResumeInFlight here
      }
    }

    async function restartPlayback() {
      if (!state.activeTrack || !state.deviceId) return;
      await spotifyApi(`https://api.spotify.com/v1/me/player/seek?position_ms=0&device_id=${encodeURIComponent(state.deviceId)}`, { method: 'PUT' });
      await resumePlayback();
    }
    function openCurrentInSpotify() {
      const url = getOpenSpotifyUrl();
      if (url) window.open(url, '_blank', 'noreferrer');
    }

    function render() {
      if (!state.currentYearData) return;
      const visibleRows = getVisibleRows();
      const renderRows = getRenderRows(visibleRows);
      const overallPeakMap = buildOverallPeakMap();
      const totalRows = state.peakWeekOnly
        ? reduceRowsToPeakWeek(getRowsForSelectedPosition()).length
        : getRowsForSelectedPosition().length;
      const currentTrackId = getCurrentTrackId();
      const isPaused = !state.playbackState || state.playbackState.paused;

      const yearLabel = state.selectedYear === 'ALL' ? 'All Years' : state.selectedYear;
      const positionLabel = state.selectedPositionLabel || positionSelect.options[positionSelect.selectedIndex]?.text || 'All Positions';
      summaryTitle.textContent = `${yearLabel} · ${positionLabel}`;
      const filterSummary = formatFilterSummary();
      const defaultSummaryText = filterSummary
        ? `${renderRows.length} of ${visibleRows.length} shown (${totalRows} total), ${filterSummary}`
        : `${renderRows.length} of ${visibleRows.length} shown (${totalRows} total)`;
      if (!state.transientNoticeTimer) {
        summarySub.textContent = defaultSummaryText;
      }
      renderSummaryFilterChips();
      updatePositionQuickPicks();

      if (!visibleRows.length) {
        const emptyDetail = formatFilterSummary();
        resultsEl.innerHTML = `<div class="empty">${emptyDetail ? `No entries found ${escapeHtml(emptyDetail)}.` : 'No entries match your current filter.'}</div>`;
        return;
      }

      resultsEl.innerHTML = renderRows.map((row, index) => {
        const song = escapeHtml(row.tm || row.t || row.title || 'Unknown song');
        const artist = escapeHtml(row.am || row.a || row.artist || 'Unknown artist');
        const week = escapeHtml(formatWeek(row.w || row.weekEnding));
        const lastWeek = row.lw ?? '–';
        const trackKey = getTrackGroupKey(row);
        const overallPeak = trackKey ? overallPeakMap.get(trackKey) : null;
        const peak = overallPeak != null ? ordinal(overallPeak) : (row.pk ?? '–');
        const weeksOnChart = row.wc ?? '–';
        const positionPill = row.__position ? `<div class="pill">Position: ${escapeHtml(ordinal(row.__position))}</div>` : '';
        const hasSpotify = !!row.sid;
        const isCurrent = currentTrackId && row.sid === currentTrackId;

        return `
          <article class="track-card">
            <div class="topline">
              <div class="topline-main">
                <div class="week">📅 ${week}</div>
                <div class="song">${song}</div>
                <p class="artist">${artist}</p>
              </div>
              <div class="row-actions-inline">
                <button class="btn-primary icon-action" data-action="play" data-index="${index}" ${hasSpotify ? '' : 'disabled'} aria-label="Play or pause track">${isCurrent && !isPaused ? '❚❚' : '▶'}</button>
                ${row.spotifyUrl ? `<button class="spotify-icon-btn icon-action" data-action="open" data-index="${index}" aria-label="Open in Spotify"><svg class="spotify-glyph" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 1.5a10.5 10.5 0 1 0 10.5 10.5A10.512 10.512 0 0 0 12 1.5Zm4.817 15.144a.655.655 0 0 1-.9.216 10.824 10.824 0 0 0-5.983-1.573 15.44 15.44 0 0 0-3.086.323.654.654 0 1 1-.264-1.281 16.752 16.752 0 0 1 3.35-.351 12.12 12.12 0 0 1 6.69 1.776.655.655 0 0 1 .193.89Zm1.286-2.862a.818.818 0 0 1-1.126.269 13.531 13.531 0 0 0-6.878-1.776 19.092 19.092 0 0 0-3.891.404.818.818 0 0 1-.34-1.6 20.546 20.546 0 0 1 4.231-.438 15.068 15.068 0 0 1 7.703 2.015.818.818 0 0 1 .301 1.122Zm.11-2.978A16.376 16.376 0 0 0 9.74 8.653a22.583 22.583 0 0 0-4.43.455 1 1 0 1 1-.404-1.959A24.617 24.617 0 0 1 9.74 6.66a18.33 18.33 0 0 1 9.476 2.414 1 1 0 0 1-1.003 1.73Z"/></svg></button>` : ''}
              </div>
            </div>
            <div class="meta">
              ${(state.selectedPosition === 'ALL' || state.selectedPosition === 'TOP_10' || state.selectedPosition === 'TOP_5') ? positionPill : ''}
              <div class="pill">Last week: ${escapeHtml(lastWeek)}</div>
              <div class="pill">Peak: ${escapeHtml(peak)}</div>
              <div class="pill">Weeks on chart: ${escapeHtml(weeksOnChart)}</div>
            </div>
          </article>
        `;
      }).join('');

      if (renderRows.length < visibleRows.length) {
        resultsEl.innerHTML += `
          <div class="panel" style="text-align:center;">
            <button class="btn-secondary" id="loadMoreBtn">
              Load more (${visibleRows.length - renderRows.length} remaining)
            </button>
          </div>
        `;
      }
    }

    async function setupSpotifyPlayer() {
      if (!state.accessToken || !window.Spotify || state.player) return;
      state.player = new window.Spotify.Player({
        name: 'UK Chart Browser',
        getOAuthToken: async cb => cb(await getValidAccessToken()),
        volume: 0.8,
      });

      state.player.addListener('ready', ({ device_id }) => {
        state.deviceId = device_id;
        state.sdkReady = true;
        updateAuthUi();
      });
      state.player.addListener('not_ready', ({ device_id }) => {
        if (state.deviceId === device_id) state.deviceId = null;
        updateAuthUi();
      });
      state.player.addListener('player_state_changed', playbackState => {
        const incomingTrackId = getPlaybackStateTrackId(playbackState);
        const incomingPosition = playbackState?.position || 0;
        const incomingPaused = !!playbackState?.paused;
        const ignoredAsStaleRestore = shouldIgnoreStaleRestoreState(playbackState);

        debugRestore('player_state_changed', {
          incomingTrackId,
          incomingPosition,
          incomingPaused,
          ignoredAsStaleRestore,
          restoreSeekTrackSid: state.restoreSeekTrackSid,
          restoreSeekTargetMs: state.restoreSeekTargetMs,
          restoreSeekUntil: state.restoreSeekUntil,
          restoreResumeInFlight: state.restoreResumeInFlight,
        });

        const pendingTrackId = state.pendingRequestedTrackSid;
        const pendingAge = Date.now() - state.pendingRequestedAt;
        const inPendingWindow = !!pendingTrackId && pendingAge < 8000;

        const sameRestoreTrack =
          state.restoreSeekTrackSid &&
          incomingTrackId === state.restoreSeekTrackSid;

        const restoreTargetReached =
          sameRestoreTrack &&
          incomingPosition >= Math.max(0, (state.restoreSeekTargetMs || 0) - 1200);

        if (state.restoreResumeInFlight && sameRestoreTrack && !restoreTargetReached) {
          debugRestore('player_state_changed:ignored-during-restore-resume-in-flight', {
            incomingTrackId,
            incomingPosition,
            incomingPaused,
            restoreSeekTrackSid: state.restoreSeekTrackSid,
            restoreSeekTargetMs: state.restoreSeekTargetMs,
            restoreResumeInFlight: state.restoreResumeInFlight,
          });
          return;
        }

        if (restoreTargetReached) {
          debugRestore('player_state_changed:restore-target-reached', {
            incomingTrackId,
            incomingPosition,
            incomingPaused,
            restoreSeekTrackSid: state.restoreSeekTrackSid,
            restoreSeekTargetMs: state.restoreSeekTargetMs,
            restoreResumeInFlight: state.restoreResumeInFlight,
          });

          state.restoreResumeInFlight = false;
          state.restoreSeekTrackSid = null;
          state.restoreSeekTargetMs = 0;
          state.restoreSeekUntil = 0;
        }

        const inRestoreSeekWindow =
          state.restoreSeekTrackSid &&
          incomingTrackId === state.restoreSeekTrackSid &&
          Date.now() < state.restoreSeekUntil;

        if (
          inRestoreSeekWindow &&
          state.restoreSeekTargetMs > 0 &&
          incomingPosition < Math.max(1000, state.restoreSeekTargetMs - 1500)
        ) {
          debugRestore('player_state_changed:ignored-pre-target-restore-window', {
            incomingTrackId,
            incomingPosition,
            incomingPaused,
            restoreSeekTrackSid: state.restoreSeekTrackSid,
            restoreSeekTargetMs: state.restoreSeekTargetMs,
          });
          return;
        }

        if (
          inPendingWindow &&
          incomingTrackId &&
          incomingTrackId !== pendingTrackId
        ) {
          debugRestore('player_state_changed:ignored-wrong-pending-track', {
            incomingTrackId,
            incomingPosition,
            incomingPaused,
            pendingTrackId,
            pendingAge,
          });
          return;
        }

        if (ignoredAsStaleRestore) {
          debugRestore('player_state_changed:ignored-stale-restore', {
            incomingTrackId,
            incomingPosition,
            incomingPaused,
            restoreSeekTrackSid: state.restoreSeekTrackSid,
            restoreSeekTargetMs: state.restoreSeekTargetMs,
          });
          return;
        }

        // Guard: the Spotify Web Playback SDK fires player_state_changed with
        // position=0 when the page returns from being backgrounded/locked, even
        // though the track was paused mid-way through. We anchor the detection to
        // whether the page was recently hidden (recorded via visibilitychange) so
        // we don't incorrectly suppress genuine seeks-to-zero.
        const hiddenRecently = state.pageHiddenAt > 0 && (Date.now() - state.pageHiddenAt) < 30000;
        const savedHidePosition = state.positionAtPageHide || 0;
        const savedHideTrackSid = state.trackSidAtPageHide || null;
        const isSdkReconnectReset =
          hiddenRecently &&
          incomingPaused &&
          incomingPosition === 0 &&
          savedHidePosition > 2000 &&
          incomingTrackId &&
          incomingTrackId === savedHideTrackSid &&
          !state.pendingRequestedTrackSid;

        if (isSdkReconnectReset) {
          debugRestore('player_state_changed:sdk-reconnect-position-preserved', {
            incomingTrackId,
            incomingPosition,
            savedHidePosition,
          });
          state.currentTrackSid = incomingTrackId;
          state.restoredPlayerStateOnly = true;
          const repairedState = { ...playbackState, position: savedHidePosition };
          state.playbackState = repairedState;
          state.lastPlaybackSnapshot = repairedState;
          state.lastPlaybackTimestamp = 0;
          state.pageHiddenAt = 0;
          updateTogglePlayButton();
          stopProgressTimer();
          refreshProgressFromSnapshot();
          render();
          return;
        }



        debugRestore('player_state_changed:accepted', {
          incomingTrackId,
          incomingPosition,
          incomingPaused,
          restoreSeekTrackSid: state.restoreSeekTrackSid,
          restoreSeekTargetMs: state.restoreSeekTargetMs,
          restoreResumeInFlight: state.restoreResumeInFlight,
        });

        state.playbackState = playbackState;
        state.lastPlaybackSnapshot = playbackState;
        state.lastPlaybackTimestamp = Date.now();
        updateTogglePlayButton();

        if (!playbackState) {
          stopProgressTimer();
          render();
          return;
        }

        const track = playbackState.track_window?.current_track;
        if (track) {
          syncPlayerTitles(track.name, track.artists.map(a => a.name).join(', '));
          setPlayerArtwork(track.album?.images?.[0]?.url || null, track.name.slice(0, 1).toUpperCase());
          playerInfo.textContent = '';

          if (!state.isScrubbing) {
            refreshProgressFromSnapshot();
          }

          playerShell.hidden = false;
          updatePlayerVisibility();

          if (
            inPendingWindow &&
            pendingTrackId &&
            incomingTrackId === pendingTrackId
          ) {
            state.pendingRequestedTrackSid = null;
            state.pendingRequestedAt = 0;
          }

          if (playbackState.paused) stopProgressTimer();
          else startProgressTimer();
        }

        render();
      });
      state.player.addListener('autoplay_failed', () => {
        alert('Spotify playback was blocked by the browser. Tap Play again.');
      });
      state.player.addListener('initialization_error', ({ message }) => { alert(`Spotify init error: ${message}`); });
      state.player.addListener('authentication_error', ({ message }) => { alert(`Spotify auth error: ${message}`); });
      state.player.addListener('account_error', ({ message }) => { alert(`Spotify account error: ${message}`); });
      state.player.addListener('playback_error', ({ message }) => {
        showTransientSummaryNotice(`Spotify playback error: ${message}`, 3000);
      });

      const connected = await state.player.connect();
      state.sdkReady = !!connected;
      updateAuthUi();
    }

    let bootstrapAuthPromise = null;

    async function bootstrapAuth() {
      if (bootstrapAuthPromise) return bootstrapAuthPromise;

      bootstrapAuthPromise = (async () => {
        const code = qs('code');
        const saved = loadTokens();
        if (saved) {
          state.accessToken = saved.access_token;
          state.refreshToken = saved.refresh_token;
          state.tokenExpiresAt = saved.expires_at;
        }
        if (code) await exchangeCodeForToken(code);
        updateAuthUi();
        await setupSpotifyPlayer();
        await restoreAppUiStateAfterLogin();
      })();

      try {
        await bootstrapAuthPromise;
      } catch (err) {
        bootstrapAuthPromise = null;
        throw err;
      }

      return bootstrapAuthPromise;
    }

    window.__ukChartBootstrapAuth = bootstrapAuth;

    window.dumpRestoreDebugLog = function () {
      console.table(window.__ukRestoreDebugLog);
      return window.__ukRestoreDebugLog;
    };

    window.clearRestoreDebugLog = function () {
      window.__ukRestoreDebugLog = [];
      console.log('restore debug log cleared');
    };

    yearSelect.addEventListener('change', async e => {
      state.selectedYear = e.target.value;
      state.randomPinnedKey = null;
      state.visibleRowLimit = 150;
      await loadYear(state.selectedYear);
    });
    positionSelect.addEventListener('change', () => {
      state.selectedPosition = positionSelect.value;
      state.selectedPositionLabel = positionSelect.options[positionSelect.selectedIndex]?.text || 'All Positions';
      state.randomPinnedKey = null;
      state.currentPlayableIndex = -1;
      state.visibleRowLimit = 150;
      render();
    });

    positionQuickPicks?.addEventListener('click', event => {
      const peakWeekBtn = event.target.closest('[data-peak-week-toggle]');
      if (peakWeekBtn) {
        state.peakWeekOnly = !state.peakWeekOnly;
        state.randomPinnedKey = null;
        state.currentPlayableIndex = -1;
        state.visibleRowLimit = 150;
        render();
        return;
      }

      const btn = event.target.closest('[data-position-quick]');
      if (!btn) return;
      state.selectedPosition = btn.dataset.positionQuick;
      positionSelect.value = state.selectedPosition;
      state.selectedPositionLabel = getPositionLabel(state.selectedPosition);
      state.randomPinnedKey = null;
      state.currentPlayableIndex = -1;
      state.visibleRowLimit = 150;
      render();
    });

    summaryFilters?.addEventListener('click', event => {
      const btn = event.target.closest('[data-clear-filter]');
      if (!btn) return;

      const filters = parseSearchFilters(state.searchTerm);
      if (btn.dataset.clearFilter === 'text') {
        state.searchTerm = filters.yearStart !== null && filters.yearEnd !== null
          ? `${filters.yearStart}-${filters.yearEnd}`
          : '';
      } else if (btn.dataset.clearFilter === 'range') {
        state.searchTerm = filters.textTerm || '';
      } else if (btn.dataset.clearFilter === 'peakweek') {
        state.peakWeekOnly = false;
      }

      searchInput.value = state.searchTerm;
      state.randomPinnedKey = null;
      state.currentPlayableIndex = -1;
      state.visibleRowLimit = 150;
      render();
    });

    searchInput.addEventListener('input', async () => {
      state.searchTerm = searchInput.value;
      state.randomPinnedKey = null;
      state.currentPlayableIndex = -1;
      state.visibleRowLimit = 150;

      const filters = parseSearchFilters(state.searchTerm);
      if (filters.yearStart !== null && filters.yearEnd !== null && state.selectedYear !== 'ALL') {
        state.selectedYear = 'ALL';
        yearSelect.value = 'ALL';
        await loadYear('ALL');
        return;
      }

      render();
    });
    resultsEl.addEventListener('click', async event => {
      const loadMoreBtn = event.target.closest('#loadMoreBtn');
      if (loadMoreBtn) {
        state.visibleRowLimit += 150;
        render();
        return;
      }

      const btn = event.target.closest('[data-action]');
      if (!btn || !resultsEl.contains(btn)) return;

      const visibleRows = getVisibleRows();
      const row = visibleRows[Number(btn.dataset.index)];
      if (!row) return;

      if (btn.dataset.action === 'open') {
        if (row.spotifyUrl) window.open(row.spotifyUrl, '_blank', 'noreferrer');
        return;
      }

      if (btn.dataset.action === 'play') {
        try {
          const isOnlyUiRestoredCurrent =
            state.restoredPlayerStateOnly &&
            state.activeTrack &&
            row.sid === state.activeTrack.sid;

          if (isOnlyUiRestoredCurrent) {
            await resumeRestoredTrack();
          } else {
            await recoverDeviceAndRetry(async () => {
              const currentTrackId = getCurrentTrackId();
              if (currentTrackId && row.sid === currentTrackId) {
                await togglePlayback();
              } else {
                await playTrack(row);
              }
            });
          }
          render();
        } catch (err) {
          alert(err.message || 'Could not start playback.');
        }
      }
    });
    spotifyStatusPill.addEventListener('click', openSpotifyModal);
    closeSpotifyModalBtn.addEventListener('click', closeSpotifyModal);
    spotifyModal.addEventListener('click', (event) => {
      if (event.target === spotifyModal) closeSpotifyModal();
    });
    loginBtn.addEventListener('click', startLogin);
    logoutBtn.addEventListener('click', async () => {
      clearTokens();
      if (state.player) { try { await state.player.disconnect(); } catch {} }
      state.player = null;
      state.deviceId = null;
      state.sdkReady = false;
      state.playbackState = null;
      state.lastPlaybackSnapshot = null;
      state.lastPlaybackTimestamp = 0;
      state.currentTrackSid = null;
      state.restoredPlayerStateOnly = false;
      state.pendingRequestedTrackSid = null;
      state.pendingRequestedAt = 0;
      stopProgressTimer();
      updateAuthUi();
    });
    randomCurrentBtn.addEventListener('click', jumpToRandomCurrent);
    randomAllBtn.addEventListener('click', jumpToRandomAll);
    closePlayerBtn.addEventListener('click', () => {
      state.isPlayerMinimized = true;
      updatePlayerVisibility();
    });
    playerMinibar.addEventListener('click', () => {
      state.isPlayerMinimized = false;
      updatePlayerVisibility();
    });
    togglePlayBtn.addEventListener('click', async () => {
      debugRestore('togglePlayBtn:click');
      try {
        if (state.restoredPlayerStateOnly && state.activeTrack) {
          await resumeRestoredTrack();
        } else {
          await recoverDeviceAndRetry(() => togglePlayback());
        }
      } catch (err) {
        alert(err.message || 'Could not control playback.');
      }
    });

    restartBtn.addEventListener('click', async () => {
      try {
        await recoverDeviceAndRetry(() => restartPlayback());
      } catch (err) {
        alert(err.message || 'Could not restart playback.');
      }
    });
    progressBar.addEventListener('input', () => {
      state.isScrubbing = true;
      currentTime.textContent = formatMs(Number(progressBar.value));
    });
    progressBar.addEventListener('change', async () => {
      try {
        if (!state.deviceId) return;
        await spotifyApi(`https://api.spotify.com/v1/me/player/seek?position_ms=${encodeURIComponent(progressBar.value)}&device_id=${encodeURIComponent(state.deviceId)}`, { method: 'PUT' });
        state.lastPlaybackTimestamp = Date.now();
        if (state.lastPlaybackSnapshot) {
          state.lastPlaybackSnapshot = { ...state.lastPlaybackSnapshot, position: Number(progressBar.value) };
        }
        refreshProgressFromSnapshot();
      } catch (err) {
        alert(err.message);
      } finally {
        state.isScrubbing = false;
      }
    });
    openSpotifyBtn.addEventListener('click', openCurrentInSpotify);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        // Snapshot the current position and track so we can detect and repair
        // the SDK's position=0 reconnect event when the page becomes visible again.
        const { position } = getDerivedPlaybackPosition();
        const trackSid = getCurrentTrackId();
        state.pageHiddenAt = Date.now();
        state.positionAtPageHide = position;
        state.trackSidAtPageHide = trackSid || null;
        debugRestore('visibilitychange:hidden', { position, trackSid });
      } else {
        debugRestore('visibilitychange:visible', {
          pageHiddenAt: state.pageHiddenAt,
          positionAtPageHide: state.positionAtPageHide,
          trackSidAtPageHide: state.trackSidAtPageHide,
        });
      }
    });

    document.addEventListener('keydown', async (event) => {
      if (event.code !== 'Space') return;
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable) return;
      if (!state.deviceId) return;
      event.preventDefault();
      try {
        await recoverDeviceAndRetry(() => togglePlayback());
      } catch (err) {
        console.error(err);
      }
    });
    if ('ResizeObserver' in window) {
      state.marqueeResizeObserver = new ResizeObserver(() => {
        refreshPlayerMarquee();
      });
      state.marqueeResizeObserver.observe(document.querySelector('.player-title'));
    } else {
      let resizeTimer = null;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(refreshPlayerMarquee, 120);
      });
    }

    updatePositionQuickPicks();
    updateTogglePlayButton();
    updatePlayerVisibility();

    (async function init() {
      try {
        await loadIndex();
        if (window.Spotify) await bootstrapAuth();
      } catch (err) {
        resultsEl.innerHTML = `<div class="error">${escapeHtml(err.message || 'Could not load app.')}</div>`;
      }
    })();
  </script>
</body>
</html>
